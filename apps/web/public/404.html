<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>ZENTRAVIX</title>
<script>
  // GitHub Pages SPA redirect trick
  // Encode the path into the query string so index.html can restore it
  var l = window.location;
  var segCount = 1; // /ZENTRAVIX = 1 path segment
  var path = l.pathname.slice(1).split('/').slice(segCount).join('/');
  if (path) {
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + segCount).join('/') + '/?p=/' + path +
      (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  } else {
    l.replace(
      l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
      '/' + l.pathname.split('/')[1] + '/'
    );
  }
</script>
</head>
<body></body>
</html>
